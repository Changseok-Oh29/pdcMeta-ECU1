# Camera support for Raspberry Pi Camera Module v1.3 (OV5647)
# Enable Video4Linux2 and libcamera support

# Video4Linux2 core
CONFIG_MEDIA_SUPPORT=y
CONFIG_MEDIA_CAMERA_SUPPORT=y
CONFIG_VIDEO_DEV=y
CONFIG_VIDEO_V4L2=y
CONFIG_VIDEO_V4L2_SUBDEV_API=y

# Camera sensor driver (OV5647 only)
CONFIG_VIDEO_OV5647=m

# BCM2835 Camera Interface
CONFIG_VIDEO_BCM2835_UNICAM=m

# Enable libcamera support
CONFIG_MEDIA_CONTROLLER=y
CONFIG_MEDIA_CONTROLLER_DVB=y
